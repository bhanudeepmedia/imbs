<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="IMBS Only Pic Logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse all IMBS programs — Doctorate, Masters, Graduate, Diploma, PG Diploma, MDP and Certificate pathways. 100% Online, Internationally Accredited.">
  <title>All Programs — IMBS</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #1C2F6E;
      --deep-navy: #111D4A;
      --red: #C8102E;
      --white: #FFFFFF;
      --off-white: #F4F4F0;
      --light-grey: #E8E8E8;
      --text-dark: #333333;
      --text-muted: #6B7A9B;
      --font-heading: 'Barlow Condensed', sans-serif;
      --font-body: 'Inter', sans-serif;
      --border-radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: var(--font-body);
      background-color: var(--off-white);
      color: var(--text-dark);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .pl-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }

    .pl-back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--white);
      text-decoration: none;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      opacity: 0.85;
    }
    .pl-back-btn:hover { opacity: 1; }
    .pl-back-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .pl-header-logo {
      height: 28px;
      width: auto;
      display: block;
    }

    .pl-header-title {
      font-family: var(--font-heading);
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── Hero Banner ── */
    .pl-hero {
      background: linear-gradient(135deg, var(--deep-navy) 0%, var(--navy) 100%);
      padding: 36px 20px 28px;
      text-align: center;
    }

    .pl-hero-overline {
      font-family: var(--font-heading);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 10px;
    }

    .pl-hero-heading {
      font-family: var(--font-heading);
      font-size: 32px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .pl-hero-desc {
      font-family: var(--font-body);
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
    }

    /* ── Content ── */
    .pl-content {
      padding: 28px 16px 80px;
      max-width: 640px;
      margin: 0 auto;
    }

    /* ── Category Section ── */
    .pl-category {
      margin-bottom: 36px;
    }

    .pl-category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--navy);
    }

    .pl-category-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
    }

    .pl-category-name {
      font-family: var(--font-heading);
      font-size: 18px;
      font-weight: 700;
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .pl-category-count {
      margin-left: auto;
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Course Card ── */
    .pl-course-card {
      background: var(--white);
      border-radius: var(--border-radius);
      padding: 18px 16px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(28,47,110,0.07);
      border: 1px solid var(--light-grey);
    }

    .pl-course-title {
      font-family: var(--font-heading);
      font-size: 17px;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.25;
      margin-bottom: 10px;
    }

    .pl-course-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .pl-meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--off-white);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .pl-meta-chip svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .pl-course-actions {
      display: flex;
      gap: 8px;
    }

    .pl-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      padding: 9px 16px;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      flex: 1;
      text-align: center;
    }

    .pl-btn-primary {
      background: var(--navy);
      color: var(--white);
      border: 2px solid var(--navy);
    }
    .pl-btn-primary:hover { background: var(--deep-navy); border-color: var(--deep-navy); }

    .pl-btn-outline {
      background: transparent;
      color: var(--red);
      border: 2px solid var(--red);
    }
    .pl-btn-outline:hover { background: var(--red); color: var(--white); }

    /* ── Skeleton Loader ── */
    .pl-skeleton {
      padding: 28px 16px;
    }

    .pl-skeleton-bar {
      background: linear-gradient(90deg, #e0e0e0 25%, #f5f5f5 50%, #e0e0e0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── Error ── */
    .pl-error {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .pl-error svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: 0.4; }
    .pl-error p { font-size: 14px; line-height: 1.6; }

    /* ── Sticky Footer CTA ── */
    .pl-sticky-cta {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--navy);
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      box-shadow: 0 -4px 20px rgba(28,47,110,0.2);
      z-index: 50;
    }

    .pl-sticky-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-body);
      text-decoration: none;
      border: none;
      cursor: pointer;
    }

    .pl-sticky-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    .pl-sticky-btn-advisor {
      background: #25D366;
      color: var(--white);
    }

    .pl-sticky-btn-brochure {
      background: var(--red);
      color: var(--white);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="pl-header">
    <a href="javascript:history.back()" class="pl-back-btn" aria-label="Go back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </a>
    <span class="pl-header-title">All Programs</span>
    <a href="index.html" aria-label="IMBS Home">
      <img src="IMBS Transparent Logo.png" alt="IMBS" class="pl-header-logo">
    </a>
  </header>

  <!-- Hero Banner -->
  <div class="pl-hero">
    <p class="pl-hero-overline">Internationally Accredited · 100% Online</p>
    <h1 class="pl-hero-heading">Explore Our<br>Programs</h1>
    <p class="pl-hero-desc">Choose from Doctorate to Certificate pathways, designed for working professionals worldwide.</p>
  </div>

  <!-- Dynamic Content -->
  <main class="pl-content" id="pl-content">
    <!-- Skeleton shown while loading -->
    <div class="pl-skeleton" id="pl-skeleton">
      <div class="pl-skeleton-bar" style="height:14px;width:50%;margin-bottom:20px;"></div>
      <div class="pl-skeleton-bar" style="height:80px;border-radius:12px;margin-bottom:10px;"></div>
      <div class="pl-skeleton-bar" style="height:80px;border-radius:12px;margin-bottom:10px;"></div>
      <div class="pl-skeleton-bar" style="height:14px;width:40%;margin-top:24px;margin-bottom:20px;"></div>
      <div class="pl-skeleton-bar" style="height:80px;border-radius:12px;margin-bottom:10px;"></div>
      <div class="pl-skeleton-bar" style="height:80px;border-radius:12px;margin-bottom:10px;"></div>
    </div>
  </main>

  <!-- Sticky Footer CTA -->
  <div class="pl-sticky-cta" id="pl-sticky-cta" style="display:none;">
    <button class="pl-sticky-btn pl-sticky-btn-advisor" id="pl-advisor-btn" aria-label="Talk to an advisor on WhatsApp">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.816 9.816 0 0 0 12.04 2zm5.72 14.12c-.24.69-1.44 1.35-1.98 1.41-.53.06-1.04.28-3.41-.65-2.85-1.12-4.68-4-4.82-4.19-.15-.19-1.18-1.58-1.18-3a3.16 3.16 0 0 1 .98-2.31c.28-.28.62-.35.83-.35.15 0 .31 0 .44.01.14.01.32-.05.5.38.19.46.65 1.58.71 1.71.06.13.1.28.01.46-.09.18-.18.3-.35.49-.17.19-.36.43-.52.58-.18.17-.37.36-.16.72.21.36.94 1.55 2.01 2.5 1.38 1.23 2.54 1.61 2.9 1.79.36.18.57.15.79-.1.21-.24.93-1.08 1.18-1.45.24-.37.49-.31.83-.18.34.13 2.16 1.02 2.53 1.2.37.18.62.27.71.43.09.16.09.93-.15 1.62z"/>
      </svg>
      Talk to Advisor
    </button>
    <button class="pl-sticky-btn pl-sticky-btn-brochure trigger-brochure-modal" aria-label="Download program brochure">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Get Brochure
    </button>
  </div>

  <!-- Brochure Modal (shared) -->
  <style>
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(17,29,74,0.85);
      z-index: 1200; display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s; padding: 20px;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal-card {
      background: var(--navy); border-radius: 16px; padding: 32px 24px;
      width: 100%; max-width: 400px; position: relative;
    }
    .modal-close {
      position: absolute; top: 14px; right: 16px; background: none; border: none;
      color: var(--white); font-size: 24px; cursor: pointer; opacity: 0.6; line-height: 1;
    }
    .modal-close:hover { opacity: 1; }
    .modal-title { font-family: var(--font-heading); font-size: 24px; font-weight: 700; color: var(--white); margin-bottom: 8px; }
    .modal-desc { font-size: 13px; color: rgba(255,255,255,0.65); margin-bottom: 24px; line-height: 1.5; }
    .form-group { position: relative; margin-bottom: 20px; }
    .form-input {
      width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.3);
      color: var(--white); font-size: 15px; padding: 8px 0; outline: none;
    }
    .form-input:focus { border-bottom-color: var(--red); }
    .form-label {
      position: absolute; left: 0; top: 8px; font-size: 15px; color: rgba(255,255,255,0.45);
      pointer-events: none; transition: transform 0.2s, font-size 0.2s, color 0.2s;
    }
    .form-input:focus ~ .form-label,
    .form-input:not(:placeholder-shown) ~ .form-label {
      transform: translateY(-20px); font-size: 11px; color: var(--red);
    }
    .btn-primary-red {
      display: block; width: 100%; padding: 14px; background: var(--red); color: var(--white);
      border: none; border-radius: 8px; font-family: var(--font-heading); font-size: 16px;
      font-weight: 700; text-transform: uppercase; cursor: pointer; margin-top: 8px;
      letter-spacing: 0.06em;
    }
  </style>

  <div class="modal-overlay" id="brochure-modal">
    <div class="modal-card">
      <button class="modal-close" id="close-brochure-modal" aria-label="Close Modal">&times;</button>
      <h3 class="modal-title">Get Program Brochure</h3>
      <p class="modal-desc">Enter your details to receive the comprehensive curriculum guide and fee breakdown.</p>
      <form id="brochure-form" novalidate>
        <div class="form-group">
          <input type="text" id="brochure-name" class="form-input" placeholder=" " required autocomplete="name">
          <label for="brochure-name" class="form-label">Full Name</label>
        </div>
        <div class="form-group">
          <input type="email" id="brochure-email" class="form-input" placeholder=" " required autocomplete="email">
          <label for="brochure-email" class="form-label">Email Address</label>
        </div>
        <div class="form-group">
          <input type="tel" id="brochure-phone" class="form-input" placeholder=" " required autocomplete="tel">
          <label for="brochure-phone" class="form-label">Phone Number</label>
        </div>
        <button type="submit" class="btn-primary-red">Request Brochure</button>
      </form>
    </div>
  </div>

  <script>
    (async function () {
      const contentEl = document.getElementById('pl-content');
      const skeletonEl = document.getElementById('pl-skeleton');
      const stickyCta = document.getElementById('pl-sticky-cta');
      const advisorBtn = document.getElementById('pl-advisor-btn');

      let waNum = '7702251899';

      // Fetch all data in parallel
      async function fetchJson(url, fallback) {
        try {
          const r = await fetch(url);
          if (!r.ok) throw new Error('not ok');
          return await r.json();
        } catch {
          const r2 = await fetch(fallback);
          return await r2.json();
        }
      }

      let categories = [], courses = [], homepage = {};
      try {
        [categories, courses, homepage] = await Promise.all([
          fetchJson('api.php?action=get_categories', 'data/categories.json'),
          fetchJson('api.php?action=get_courses', 'data/courses.json'),
          fetchJson('api.php?action=get_homepage', 'data/homepage.json'),
        ]);
      } catch (err) {
        skeletonEl.remove();
        contentEl.innerHTML = `
          <div class="pl-error">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <p>Could not load programs. Please check your connection and try again.</p>
          </div>`;
        return;
      }

      // Extract WhatsApp number
      if (homepage.footer && homepage.footer.whatsapp_number) {
        waNum = homepage.footer.whatsapp_number.replace(/\D/g, '');
      }

      // Wire advisor button
      const advisorUrl = `https://wa.me/${waNum}?text=${encodeURIComponent('Hello, I would like to speak with an admissions advisor regarding IMBS programs.')}`;
      advisorBtn.addEventListener('click', () => window.open(advisorUrl, '_blank', 'noopener'));

      // Show sticky CTA
      stickyCta.style.display = 'flex';

      // Build category → courses map
      const activeCourses = courses.filter(c => c.status === 'active');

      // Clock SVG
      const clockSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
      const gradSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>`;

      // Build HTML
      let html = '';
      categories.forEach(cat => {
        const catCourses = activeCourses.filter(c => c.category === cat.id);
        if (!catCourses.length) return;

        html += `
          <div class="pl-category">
            <div class="pl-category-header">
              <span class="pl-category-dot"></span>
              <span class="pl-category-name">${escHtml(cat.name)}</span>
              <span class="pl-category-count">${catCourses.length} program${catCourses.length !== 1 ? 's' : ''}</span>
            </div>`;

        catCourses.forEach(course => {
          const duration = course.hero && course.hero.duration ? course.hero.duration : null;
          const eligibility = course.hero && course.hero.eligibility ? course.hero.eligibility : null;
          html += `
            <div class="pl-course-card">
              <h2 class="pl-course-title">${escHtml(course.title)}</h2>
              <div class="pl-course-meta">
                ${duration ? `<span class="pl-meta-chip">${clockSvg} ${escHtml(duration)}</span>` : ''}
                ${eligibility ? `<span class="pl-meta-chip">${gradSvg} ${escHtml(eligibility)}</span>` : ''}
              </div>
              <div class="pl-course-actions">
                <a href="course.html?slug=${encodeURIComponent(course.slug)}" class="pl-btn pl-btn-primary">Learn More</a>
                <a href="checkout.html?slug=${encodeURIComponent(course.slug)}" class="pl-btn pl-btn-outline">Pay Fee</a>
              </div>
            </div>`;
        });

        html += '</div>';
      });

      skeletonEl.remove();
      contentEl.insertAdjacentHTML('beforeend', html);

      function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      }

      // Brochure modal logic
      const modal = document.getElementById('brochure-modal');
      const closeBtn = document.getElementById('close-brochure-modal');
      const form = document.getElementById('brochure-form');
      const openBtns = document.querySelectorAll('.trigger-brochure-modal');

      function openModal() { modal.classList.add('active'); }
      function closeModal() { modal.classList.remove('active'); }

      openBtns.forEach(b => b.addEventListener('click', openModal));
      closeBtn.addEventListener('click', closeModal);
      modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

      form.addEventListener('submit', async e => {
        e.preventDefault();
        const name = document.getElementById('brochure-name').value.trim();
        const email = document.getElementById('brochure-email').value.trim();
        const phone = document.getElementById('brochure-phone').value.trim();
        if (!name || !email || !phone) return;

        try {
          await fetch('api.php?action=save_lead', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, phone, source: 'brochure_request' })
          });
        } catch (err) {
          console.warn('IMBS: Lead save failed', err);
        }

        const card = modal.querySelector('.modal-card');
        const orig = card.innerHTML;
        card.innerHTML = `
          <h3 class="modal-title">Thank You!</h3>
          <p class="modal-desc" style="margin-top:12px;font-size:14px;color:rgba(255,255,255,0.8);">
            Your request has been received. Redirecting you to WhatsApp to get your brochure…
          </p>`;

        const waText = encodeURIComponent(
          `Hello, I have submitted my details to request the program brochure. Name: ${name}, Email: ${email}, Phone: ${phone}.`
        );
        setTimeout(() => {
          window.open(`https://wa.me/${waNum}?text=${waText}`, '_blank', 'noopener');
          closeModal();
          setTimeout(() => {
            card.innerHTML = orig;
            document.getElementById('close-brochure-modal').addEventListener('click', closeModal);
          }, 300);
        }, 1200);
      });
    })();
  </script>

</body>
</html>
